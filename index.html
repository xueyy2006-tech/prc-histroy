<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国当代史（1949-1982）| ECNU复习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','STSong','SimSun',serif;background:#f5f0e8;color:#2c2416;line-height:1.8}
.top-tabs{display:flex;justify-content:center;gap:8px;padding:16px;background:#1a1a1a;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.top-tab{padding:12px 28px;background:#333;color:#ccc;border:none;border-radius:6px;cursor:pointer;font-size:1em;font-family:inherit;transition:all .2s}
.top-tab:hover{background:#555;color:#fff}
.top-tab.active{background:#c0392b;color:#fff;font-weight:700}
#tab-content{max-width:1100px;margin:0 auto;padding:20px}
.entry-card{background:#fff;border:1px solid #d5cfc0;border-radius:6px;padding:18px 22px;margin:12px 0;cursor:pointer;transition:all .15s}
.entry-card:hover{border-color:#c0392b;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.entry-card h3{font-size:1.1em;color:#2c2416;margin-bottom:6px}
.entry-card .meta{font-size:.8em;color:#a0522d;margin-bottom:6px}
.entry-card .preview{font-size:.9em;color:#666;line-height:1.6}
#detail-panel{position:fixed;top:80px;right:0;width:60%;height:calc(100vh-80px);background:#fdfbf5;border-left:2px solid #c0392b;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:24px 32px 100px;display:none;box-shadow:-4px 0 16px rgba(0,0,0,.1);z-index:99}
#detail-panel img{max-width:100%;margin:8px 0;border:1px solid #d5cfc0}
#detail-overlay{position:fixed;top:0;left:0;width:40%;height:100vh;z-index:98;display:none}
#close-detail{position:sticky;top:8px;float:right;background:#c0392b;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:1em;z-index:101}
@media(max-width:768px){#detail-panel{width:100%}#detail-overlay{display:none!important}}
.search-box{padding:8px 16px;text-align:center}
.search-box input{width:400px;max-width:90%;padding:10px;border:1px solid #d5cfc0;border-radius:4px;font-size:1em;font-family:inherit}
.section-header{background:#c0392b;color:#fff;padding:8px 16px;margin:16px 0 8px;border-radius:4px;font-weight:700}
.stats{margin:16px 0;padding:12px;background:#fff;border:1px solid #d5cfc0;border-radius:6px;text-align:center}
@media(max-width:768px){#detail-panel{width:100%}}
</style>
</head>
<body>

<div class="top-tabs">
  <button class="top-tab active" onclick="switchTab(0)">1. 课堂笔记（考试重点）</button>
  <button class="top-tab" onclick="switchTab(1)">2. 三本书深度笔记（1264张引文截图）</button>
  <button class="top-tab" onclick="switchTab(2)">3. 长孙博题库（166页原版扫描）</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="搜索..." oninput="doSearch(this.value)">
</div>

<div id="tab-content"></div>

<div id="detail-panel">
  <button id="close-detail" onclick="closeDetail()">X 关闭</button>
  <div id="detail-content"></div>
</div>

<script src="js/data_classnotes.js"></script>
<script src="js/data_books.js"></script>

<script>
var currentTab=0;
function switchTab(n){currentTab=n;document.querySelectorAll('.top-tab').forEach(function(t,i){t.classList.toggle('active',i===n)});document.getElementById('detail-panel').style.display='none';renderTab();}
function renderTab(){var c=document.getElementById('tab-content');if(currentTab===0)renderClassNotes(c);else if(currentTab===1)renderBooks(c);else renderQuizBank(c);}
function renderClassNotes(c){var h='<div class=stats>课堂笔记 &middot; '+CLASS_NOTES.length+'章 &middot; 来源:ECNU中国当代史期末考试复习</div>';CLASS_NOTES.forEach(function(e){h+='<div class=entry-card onclick=showClassDetail(\"'+e.id+'\")><h3>'+e.title+'</h3><div class=preview>'+e.content.substring(0,300)+'...</div></div>'});c.innerHTML=h}
function showClassDetail(id){var e=CLASS_NOTES.find(function(x){return x.id===id});if(!e)return;var p=document.getElementById('detail-panel');document.getElementById('detail-content').innerHTML='<h2>'+e.title+'</h2><div style=white-space:pre-wrap;margin-top:16px>'+e.content+'</div>';p.style.display='block'}
function renderBooks(c){var ti=BOOK_ENTRIES.reduce(function(s,e){return s+(e.image_count||0)},0);var h='<div class=stats>三本书笔记 &middot; '+BOOK_ENTRIES.length+'章 &middot; '+ti+'张真实引文截图</div>';var cs='';BOOK_ENTRIES.forEach(function(e){if(e.section!==cs){cs=e.section;h+='<div class=section-header>'+cs+'</div>'}h+='<div class=entry-card onclick=showBookDetail(\"'+e.id+'\")><h3>'+e.title+'</h3><div class=meta>'+e.image_count+' 张引文截图</div><div class=preview>'+(e.core||e.preview).substring(0,300)+'...</div></div>'});c.innerHTML=h}
function showBookDetail(id){var e=BOOK_ENTRIES.find(function(x){return x.id===id});if(!e)return;var p=document.getElementById('detail-panel');p.querySelector('#detail-content').innerHTML='<h2>'+e.title+'</h2><div class=meta>'+e.section+' &middot; '+e.image_count+' 张引文截图</div><div style=margin-top:16px>'+e.full_content+'</div>';p.style.display='block';p.scrollTop=0}
function renderQuizBank(c){c.innerHTML='<div style=text-align:center;padding:40px><h2>长孙博题库</h2><p style=margin:20px 0>名词解释63页 + 论述题103页 &middot; 原版扫描 &middot; 无信息损失</p><p><a href=quiz-bank/ style=font-size:1.2em;color:#c0392b;text-decoration:none;font-weight:700;padding:12px 32px;border:2px solid #c0392b;border-radius:6px>打开题库</a></p><p style=margin-top:16px;color:#999>键盘左右箭头翻页 &middot; 顶部标签切换名词解释/论述题</p></div>'}
function closeDetail(){document.getElementById('detail-panel').style.display='none'}
function doSearch(q){if(!q||q.length<1){renderTab();return}var c=document.getElementById('tab-content');var r=[];q=q.toLowerCase();if(currentTab===0){r=CLASS_NOTES.filter(function(e){return e.title.toLowerCase().indexOf(q)>-1||e.content.toLowerCase().indexOf(q)>-1});var h='<h3>搜索: '+q+' ('+r.length+'条)</h3>';r.forEach(function(e){h+='<div class=entry-card onclick=showClassDetail(\"'+e.id+'\")><h3>'+e.title+'</h3></div>'});c.innerHTML=h}else if(currentTab===1){r=BOOK_ENTRIES.filter(function(e){return e.title.toLowerCase().indexOf(q)>-1||(e.core||'').toLowerCase().indexOf(q)>-1});var h='<h3>搜索: '+q+' ('+r.length+'条)</h3>';r.forEach(function(e){h+='<div class=entry-card onclick=showBookDetail(\"'+e.id+'\")><h3>'+e.title+'</h3><div class=meta>'+e.section+'</div></div>'});c.innerHTML=h}}
renderTab();
</script>
</body>
</html>
