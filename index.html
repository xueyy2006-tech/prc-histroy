<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国当代史（1949-1982）| ECNU复习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','STSong','SimSun',serif;background:#f5f0e8;color:#2c2416;line-height:1.8}
.top-tabs{display:flex;justify-content:center;gap:8px;padding:16px;background:#1a1a1a;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.top-tab{padding:12px 28px;background:#333;color:#ccc;border:none;border-radius:6px;cursor:pointer;font-size:1em;font-family:inherit}
.top-tab:hover{background:#555;color:#fff}
.top-tab.active{background:#c0392b;color:#fff;font-weight:700}
#main-area{max-width:1100px;margin:0 auto;padding:20px}
.entry-card{background:#fff;border:1px solid #d5cfc0;border-radius:6px;padding:18px 22px;margin:12px 0;cursor:pointer}
.entry-card:hover{border-color:#c0392b;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.entry-card h3{font-size:1.1em;margin-bottom:6px}
.meta{font-size:.8em;color:#a0522d;margin-bottom:6px}
.preview{font-size:.9em;color:#666;line-height:1.6}
.section-header{background:#c0392b;color:#fff;padding:8px 16px;margin:16px 0 8px;border-radius:4px;font-weight:700}
.stats{margin:16px 0;padding:12px;background:#fff;border:1px solid #d5cfc0;border-radius:6px;text-align:center}
.search-box{padding:8px 16px;text-align:center}
.search-box input{width:400px;max-width:90%;padding:10px;border:1px solid #d5cfc0;border-radius:4px;font-size:1em;font-family:inherit}
#detail-area{display:none}
#detail-area img{max-width:100%;margin:8px 0;border:1px solid #d5cfc0}
.back-btn{display:inline-block;background:#c0392b;color:#fff;padding:10px 24px;border:none;border-radius:4px;cursor:pointer;font-size:1em;font-family:inherit;margin-bottom:16px}
.back-btn:hover{background:#8b0000}
/* Tab 4: Sidebar layout */
#tab4-layout{display:flex;min-height:calc(100vh-120px)}
#tab4-sidebar{width:280px;min-width:280px;background:#1a1a1a;color:#ccc;padding:16px 0;overflow-y:auto}
#tab4-sidebar h3{padding:8px 20px;font-size:.85em;color:#999;text-transform:uppercase}
#tab4-sidebar a{display:block;padding:6px 20px;color:#bbb;text-decoration:none;font-size:.9em;cursor:pointer}
#tab4-sidebar a:hover{background:#2a2a2a;color:#fff}
#tab4-sidebar a.active{background:#c0392b;color:#fff}
#tab4-main{flex:1;padding:20px 30px;overflow-y:auto}
#tab4-main .entry-card{border-left:4px solid #c0392b}
@media(max-width:768px){#tab4-layout{flex-direction:column}#tab4-sidebar{width:100%;min-width:100%;max-height:200px}}
</style>
</head>
<body>

<div class="top-tabs">
  <button class="top-tab active" onclick="switchTab(0)">1. 课堂笔记（考试重点）</button>
  <button class="top-tab" onclick="switchTab(1)">2. 三本书深度笔记（1264张引文截图）</button>
  <button class="top-tab" onclick="switchTab(2)">3. 长孙博题库（166页原版扫描）</button>
  <button class="top-tab" onclick="switchTab(3)">4. 综合知识库（时间轴+分类浏览）</button>
</div>

<div class="search-box"><input type="text" id="search" placeholder="搜索..." oninput="doSearch(this.value)"></div>

<div id="main-area">
  <div id="list-area"></div>
  <div id="detail-area"></div>
</div>

<div id="tab4-layout" style="display:none">
  <div id="tab4-sidebar">
    <div style="padding:8px 16px;background:#c0392b;color:#fff;font-weight:700;margin-bottom:8px">综合知识库</div>
    <div style="padding:4px 16px"><input id="tab4-search" placeholder="搜索..." style="width:100%;padding:6px 10px;border:1px solid #444;background:#2a2a2a;color:#eee;border-radius:4px;font-size:.9em" oninput="tab4Search(this.value)"></div>
    <h3>📅 时期</h3><div id="tab4-timeline"></div>
    <h3 style="margin-top:12px">📂 分类</h3><div id="tab4-categories"></div>
    <h3 style="margin-top:12px">📑 快捷目录</h3><div id="tab4-toc" style="max-height:300px;overflow-y:auto"></div>
  </div>
  <div id="tab4-main">
    <div id="tab4-timeline-viz" style="background:#fff;border:1px solid #d5cfc0;border-radius:8px;padding:16px 20px;margin-bottom:12px;overflow-x:auto"></div>
    <div id="tab4-stats" style="margin-bottom:12px"></div>
    <div id="tab4-list"></div>
    <div id="tab4-detail" style="display:none"></div>
  </div>
</div>

<script src="js/data_classnotes.js?v=2"></script>
<script src="js/data_books.js?v=2"></script>
<script src="js/data_cards.js?v=3"></script>

<script>
var currentTab=0, currentView='list';

function switchTab(n){
  currentTab=n; currentView='list';
  document.querySelectorAll('.top-tab').forEach(function(t,i){t.classList.toggle('active',i===n)});
  document.getElementById('detail-area').style.display='none';
  document.getElementById('list-area').style.display='block';
  renderList();
}

function renderList(){
  var c=document.getElementById('list-area');
  if(currentTab===0) renderClassNotes(c);
  else if(currentTab===1) renderBooks(c);
  else renderQuizBank(c);
}

function renderClassNotes(c){
  var h='<div class=stats>课堂笔记 &middot; '+CLASS_NOTES.length+'章 &middot; 来源:ECNU中国当代史期末考试复习</div>';
  CLASS_NOTES.forEach(function(e){h+='<div class=entry-card onclick=showClassDetail(\"'+e.id+'\")><h3>'+e.title+'</h3><div class=preview>'+e.content.substring(0,300)+'...</div></div>'});
  c.innerHTML=h;
}

function renderBooks(c){
  var ti=BOOK_ENTRIES.reduce(function(s,e){return s+(e.image_count||0)},0);
  var h='<div class=stats>三本书笔记 &middot; '+BOOK_ENTRIES.length+'章 &middot; '+ti+'张真实引文截图</div>';
  var cs='';
  BOOK_ENTRIES.forEach(function(e){
    if(e.section!==cs){cs=e.section;h+='<div class=section-header>'+cs+'</div>'}
    h+='<div class=entry-card onclick=showBookDetail(\"'+e.id+'\")><h3>'+e.title+'</h3><div class=meta>'+e.image_count+' 张引文截图</div><div class=preview>'+(e.core||e.preview).substring(0,300)+'...</div></div>'
  });
  c.innerHTML=h;
}

function renderQuizBank(c){
  c.innerHTML='<div style=text-align:center;padding:40px><h2>长孙博题库</h2><p style=margin:20px>名词解释63页 + 论述题103页 &middot; 原版扫描 &middot; 无信息损失</p><p><a href=quiz-bank/ style=font-size:1.2em;color:#c0392b;text-decoration:none;font-weight:700;padding:12px 32px;border:2px solid #c0392b;border-radius:6px>打开题库</a></p><p style=margin-top:16px;color:#999>键盘左右箭头翻页</p></div>';
}

function showDetail(title, meta, content){
  currentView='detail';
  document.getElementById('list-area').style.display='none';
  var d=document.getElementById('detail-area');
  d.style.display='block';
  d.innerHTML='<button class=back-btn onclick=goBack()>← 返回列表</button><h2 style=color:#c0392b;margin-bottom:16px>'+title+'</h2><div class=meta>'+meta+'</div><div style=margin-top:16px>'+content+'</div>';
  window.scrollTo(0,0);
}

function showClassDetail(id){
  var e=CLASS_NOTES.find(function(x){return x.id===id});if(!e)return;
  showDetail(e.title, '', '<div style=white-space:pre-wrap>'+e.content+'</div>');
}
function showBookDetail(id){
  var e=BOOK_ENTRIES.find(function(x){return x.id===id});if(!e)return;
  showDetail(e.title, e.section+' &middot; '+e.image_count+' 张引文截图', e.full_content);
}

function goBack(){
  currentView='list';
  document.getElementById('detail-area').style.display='none';
  document.getElementById('list-area').style.display='block';
  renderList();
  window.scrollTo(0,0);
}

function doSearch(q){
  if(!q||q.length<1){renderList();return}
  var c=document.getElementById('list-area'),r=[],h='';q=q.toLowerCase();
  if(currentTab===0){
    r=CLASS_NOTES.filter(function(e){return e.title.toLowerCase().indexOf(q)>-1||e.content.toLowerCase().indexOf(q)>-1});
    h='<h3>搜索: '+q+' ('+r.length+'条)</h3>';
    r.forEach(function(e){h+='<div class=entry-card onclick=showClassDetail(\"'+e.id+'\")><h3>'+e.title+'</h3></div>'});
  }else if(currentTab===1){
    r=BOOK_ENTRIES.filter(function(e){return e.title.toLowerCase().indexOf(q)>-1||(e.core||'').toLowerCase().indexOf(q)>-1});
    h='<h3>搜索: '+q+' ('+r.length+'条)</h3>';
    r.forEach(function(e){h+='<div class=entry-card onclick=showBookDetail(\"'+e.id+'\")><h3>'+e.title+'</h3><div class=meta>'+e.section+'</div></div>'});
  }
  c.innerHTML=h;
}

// ===== TAB 4: Enhanced Knowledge Base =====
var TAB4_PERIODS=[{id:'1949-1952',label:'1949-1952 新政权建立与巩固'},{id:'1953-1956',label:'1953-1956 社会主义改造'},{id:'1956-1957',label:'1956-1957 双百与反右'},{id:'1958-1961',label:'1958-1961 大跃进与大饥荒'},{id:'1961-1965',label:'1961-1965 调整与社教'},{id:'1966-1969',label:'1966-1969 文革高潮'},{id:'1969-1976',label:'1969-1976 文革后期与终结'},{id:'1976-1982',label:'1976-1982 改革开放启动'}];
var TAB4_CATS=[{key:'events',label:'政治事件',icon:'📜'},{key:'terms',label:'名词解释',icon:'📖'},{key:'documents',label:'重要文件',icon:'📄'},{key:'meetings',label:'重要会议',icon:'🏛'},{key:'figures',label:'重要人物',icon:'👤'},{key:'movements',label:'重要运动',icon:'🔥'}];
var tab4Period=null, tab4Cat=null, tab4SearchQ='';

function getTab4Data(){return (typeof ALL_CARDS!=='undefined'&&ALL_CARDS.length>0)?ALL_CARDS:[];}
function tab4Filtered(){var d=getTab4Data();if(tab4Period)d=d.filter(function(e){return e.period===tab4Period});if(tab4Cat)d=d.filter(function(e){return e.category===tab4Cat});if(tab4SearchQ){var q=tab4SearchQ.toLowerCase();d=d.filter(function(e){return(e.title||'').toLowerCase().indexOf(q)>-1||(e.summary||'').toLowerCase().indexOf(q)>-1});}return d;}

function renderTab4(){
  document.getElementById('main-area').style.display='none';document.getElementById('tab4-layout').style.display='flex';
  renderTab4Sidebar();renderTab4TimelineViz();renderTab4List();renderTab4Stats();
}
function renderTab4TimelineViz(){
  var all=getTab4Data();var container=document.getElementById('tab4-timeline-viz');
  var totalWidth=100;var periodWidth=totalWidth/TAB4_PERIODS.length;
  var maxCount=Math.max.apply(null,TAB4_PERIODS.map(function(p){return all.filter(function(e){return e.period===p.id}).length}));
  var h='<div style=position:relative;height:80px>';
  // Line
  h+='<div style=position:absolute;top:30px;left:0;right:0;height:3px;background:#d5cfc0></div>';
  // Dots and labels
  TAB4_PERIODS.forEach(function(p,i){
    var count=all.filter(function(e){return e.period===p.id}).length;
    var left=(i*periodWidth+periodWidth/2)+'%';
    var size=Math.max(8,Math.min(28,(count/maxCount)*28));
    var isActive=tab4Period===p.id;
    h+='<div onclick=tab4SetFilter(\"'+p.id+'\",null) style=cursor:pointer;position:absolute;top:'+(30-size/2)+'px;left:'+left+';width:'+size+'px;height:'+size+'px;background:'+(isActive?'#c0392b':'#3a7ca5')+';border-radius:50%;transform:translateX(-50%);z-index:2 title=\"'+p.label+': '+count+'条\"></div>';
    h+='<div onclick=tab4SetFilter(\"'+p.id+'\",null) style=cursor:pointer;position:absolute;top:58px;left:'+left+';transform:translateX(-50%);font-size:.7em;color:'+(isActive?'#c0392b':'#666')+';white-space:nowrap;font-weight:'+(isActive?'700':'400')+'">'+p.label.split(' ')[0]+'<br><b>'+count+'</b></div>';
  });
  h+='</div>';
  container.innerHTML=h;
}

function renderTab4Stats(){
  var all=getTab4Data();var filt=tab4Filtered();
  var cats={};all.forEach(function(e){cats[e.category]=(cats[e.category]||0)+1});
  var h='<b>共 '+filt.length+'/'+all.length+' 条</b> | ';
  TAB4_CATS.forEach(function(c){h+=c.icon+' '+(cats[c.key]||0)+' ';});
  document.getElementById('tab4-stats').innerHTML=h;
}
function renderTab4Sidebar(){
  var all=getTab4Data();var catLabel={events:'事件',documents:'文件',meetings:'会议',figures:'人物',terms:'名词',movements:'运动'};
  // Timeline with category breakdown
  var tl=document.getElementById('tab4-timeline');tl.innerHTML='';
  TAB4_PERIODS.forEach(function(p){
    var periodCards=all.filter(function(e){return e.period===p.id});
    var c=periodCards.length;if(c===0)return;
    var cats='';TAB4_CATS.forEach(function(ct){var n=periodCards.filter(function(e){return e.category===ct.key}).length;if(n>0)cats+='<small style=color:#888>'+ct.icon+n+' </small>';});
    tl.innerHTML+='<a class="'+(tab4Period===p.id?'active':'')+'" onclick="tab4SetFilter(\''+p.id+'\',null)" style=line-height:1.6>'+p.label+' <b>('+c+')</b><br>'+cats+'</a>';
  });
  tl.innerHTML+='<a class="'+(tab4Period===null&&tab4Cat===null?'active':'')+'" onclick="tab4SetFilter(null,null)">📋 全部显示 ('+all.length+')</a>';
  // Categories with period breakdown
  var cl=document.getElementById('tab4-categories');cl.innerHTML='';
  TAB4_CATS.forEach(function(ct){
    var catCards=all.filter(function(e){return e.category===ct.key});var n=catCards.length;if(n===0)return;
    var periods='';TAB4_PERIODS.forEach(function(p){var pn=catCards.filter(function(e){return e.period===p.id}).length;if(pn>0)periods+='<small style=color:#888>'+pn+' </small>';});
    cl.innerHTML+='<a class="'+(tab4Cat===ct.key?'active':'')+'" onclick="tab4SetFilter(null,\''+ct.key+'\')" style=line-height:1.6>'+ct.icon+' '+ct.label+' <b>('+n+')</b><br>'+periods+'</a>';
  });
  // TOC with categories
  var toc=document.getElementById('tab4-toc');toc.innerHTML='';
  var filt=tab4Filtered();filt.slice(0,120).forEach(function(e){
    var cn=(e.summary||'').length;var star=cn>300?'★':cn>100?'·':'';var ct=catLabel[e.category]||'';
    toc.innerHTML+='<a onclick="tab4ShowDetail(\''+e.id+'\');document.getElementById(\'tab4-detail\').scrollIntoView()" title="'+ct+' · '+cn+'字"><small style=color:#888>'+ct+'</small> '+star+e.title.substring(0,22)+'</a>';
  });
}
function tab4SetFilter(p,c){tab4Period=p;tab4Cat=c;document.getElementById('tab4-detail').style.display='none';document.getElementById('tab4-list').style.display='block';renderTab4Sidebar();renderTab4TimelineViz();renderTab4List();renderTab4Stats();}
function tab4Search(q){tab4SearchQ=q;renderTab4Sidebar();renderTab4List();renderTab4Stats();}

function renderTab4List(){
  var data=tab4Filtered();var c=document.getElementById('tab4-list');
  var catLabel={events:'政治事件',documents:'重要文件',meetings:'重要会议',figures:'重要人物',terms:'名词解释',movements:'重要运动'};
  var h='';
  data.forEach(function(e){
    var cat=catLabel[e.category]||e.category;var p=e.period||'1949-1982';var s=(e.summary||'');var cn=s.length;
    var quality=cn>500?'🟢':cn>200?'🟡':cn>50?'🟠':'🔴';
    h+='<div class=entry-card onclick=tab4ShowDetail(\"'+e.id+'\")><h3>'+e.title+' <small style=color:#999>'+quality+'</small></h3><div class=meta><span style=background:#3a7ca5;color:#fff;padding:1px 6px;border-radius:3px;margin-right:6px>'+cat+'</span> '+p+' · '+cn+'字</div><div class=preview>'+s.substring(0,200)+'...</div></div>';
  });
  if(data.length===0)h='<div class=stats>没有匹配的卡片，请调整筛选条件</div>';
  c.innerHTML=h;
}

function tab4ShowDetail(id){
  var e=getTab4Data().find(function(x){return x.id===id});if(!e)return;
  document.getElementById('tab4-list').style.display='none';var d=document.getElementById('tab4-detail');d.style.display='block';
  var catLabel={events:'政治事件',documents:'重要文件',meetings:'重要会议',figures:'重要人物',terms:'名词解释',movements:'重要运动'};
  var h='<button class=back-btn onclick=tab4GoBack()>← 返回列表</button><h2 style=color:#c0392b>'+e.title+'</h2>';
  h+='<div class=meta>'+ (catLabel[e.category]||e.category) +' · '+ (e.period||'') +' · '+(e.summary||'').length+'字</div>';
  h+='<div style=margin-top:16px>';
  if(e.summary)h+='<h3>概述</h3><p>'+e.summary+'</p>';
  if(e.background&&e.background.length>0&&e.background[0]){h+='<h3>背景与前因</h3>';e.background.forEach(function(p){if(p)h+='<p>'+p+'</p>'});}
  if(e.process&&e.process.length>0&&e.process[0]){h+='<h3>过程与内容</h3>';e.process.forEach(function(p){if(p)h+='<p>'+p+'</p>'});}
  if(e.result&&e.result.length>5)h+='<h3>结果</h3><p>'+e.result+'</p>';
  if(e.impact&&e.impact.length>5)h+='<h3>影响与意义</h3><p>'+e.impact+'</p>';
  h+='</div>';
  d.innerHTML=h;window.scrollTo(0,0);
}
function tab4GoBack(){document.getElementById('tab4-detail').style.display='none';document.getElementById('tab4-list').style.display='block';window.scrollTo(0,0);}

// Patch switchTab for tab 4
var _origSwitchTab=switchTab;
switchTab=function(n){
  document.getElementById('tab4-layout').style.display='none';document.getElementById('main-area').style.display='block';
  if(n===3){currentTab=3;document.querySelectorAll('.top-tab').forEach(function(t,i){t.classList.toggle('active',i===n)});document.getElementById('main-area').style.display='none';renderTab4();}
  else _origSwitchTab(n);
};

renderList();
</script>
</body>
</html>
